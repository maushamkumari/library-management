<!doctype html>
<html lang="en">
<head th:replace="~{fragments/head :: head('Students')}"></head>
<body><div class="app-shell"><nav th:replace="~{fragments/sidebar :: sidebar}"></nav><main class="content">
    <header class="topbar"><div><h1>Students</h1><p>Manage student profiles and enrollment records.</p></div><a class="btn btn-primary" th:href="@{/students/new}"><i class="fa-solid fa-plus"></i> Add Student</a></header>
    <form class="toolbar" method="get"><input class="form-control" name="q" placeholder="Name, email, enrollment"><button class="btn btn-outline-primary"><i class="fa-solid fa-magnifying-glass"></i></button></form>
    <div class="table-wrap"><table class="table"><thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Enrollment</th><th>Department</th><th></th></tr></thead><tbody><tr th:each="student : ${students}"><td th:text="${student.fullName}"></td><td th:text="${student.email}"></td><td th:text="${student.phone}"></td><td th:text="${student.enrollmentNo}"></td><td th:text="${student.department}"></td><td class="actions"><a class="btn btn-sm btn-outline-secondary" th:href="@{/students/{id}/edit(id=${student.studentId})}"><i class="fa-solid fa-pen"></i></a><form th:action="@{/students/{id}/delete(id=${student.studentId})}" method="post"><button class="btn btn-sm btn-outline-danger"><i class="fa-solid fa-trash"></i></button></form></td></tr></tbody></table></div>
</main></div><div th:replace="~{fragments/scripts :: scripts}"></div></body></html>
