<!doctype html>
<html lang="en">
<head th:replace="~{fragments/head :: head('Books')}"></head>
<body><div class="app-shell"><nav th:replace="~{fragments/sidebar :: sidebar}"></nav><main class="content">
    <header class="topbar"><div><h1>Books</h1><p>Search, filter, and maintain book inventory.</p></div><a class="btn btn-primary" th:href="@{/books/new}"><i class="fa-solid fa-plus"></i> Add Book</a></header>
    <form class="toolbar" method="get"><input class="form-control" name="q" placeholder="Title, author, ISBN, category"><select class="form-select" name="category"><option value="">All categories</option><option th:each="cat : ${categories}" th:value="${cat.categoryName}" th:text="${cat.categoryName}"></option></select><button class="btn btn-outline-primary"><i class="fa-solid fa-filter"></i></button></form>
    <div class="table-wrap"><table class="table align-middle"><thead><tr><th>Title</th><th>Author</th><th>ISBN</th><th>Category</th><th>Qty</th><th>Available</th><th></th></tr></thead><tbody><tr th:each="book : ${books}"><td th:text="${book.title}"></td><td th:text="${book.author}"></td><td th:text="${book.isbn}"></td><td th:text="${book.category}"></td><td th:text="${book.quantity}"></td><td th:text="${book.availableQuantity}"></td><td class="actions"><a class="btn btn-sm btn-outline-secondary" th:href="@{/books/{id}/edit(id=${book.bookId})}"><i class="fa-solid fa-pen"></i></a><form th:action="@{/books/{id}/delete(id=${book.bookId})}" method="post"><button class="btn btn-sm btn-outline-danger"><i class="fa-solid fa-trash"></i></button></form></td></tr></tbody></table></div>
</main></div><div th:replace="~{fragments/scripts :: scripts}"></div></body></html>
