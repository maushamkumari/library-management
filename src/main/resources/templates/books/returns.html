<!doctype html>
<html lang="en">
<head th:replace="~{fragments/head :: head('Return Book')}"></head>
<body><div class="app-shell"><nav th:replace="~{fragments/sidebar :: sidebar}"></nav><main class="content">
    <header class="topbar"><div><h1>Return Book</h1><p>Record returns, restore inventory, and generate fines automatically.</p></div></header>
    <form class="panel form-inline" th:action="@{/returns}" method="post"><select class="form-select" name="issueId"><option th:each="issue : ${issues}" th:value="${issue.issueId}" th:text="${issue.issueId + ' - ' + issue.status}"></option></select><button class="btn btn-primary"><i class="fa-solid fa-rotate-left"></i> Return</button></form>
    <div class="table-wrap"><table class="table"><thead><tr><th>Receipt</th><th>Issue ID</th><th>Return Date</th><th>Fine</th></tr></thead><tbody><tr th:each="ret : ${returns}"><td th:text="${ret.returnId}"></td><td th:text="${ret.issueId}"></td><td th:text="${ret.returnDate}"></td><td th:text="${ret.fine}"></td></tr></tbody></table></div>
</main></div><div th:replace="~{fragments/scripts :: scripts}"></div></body></html>
